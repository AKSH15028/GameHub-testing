
<app-header></app-header>
<div class="login-container">
  
  <div class="glass-card">
    <h2>Sign in</h2>
    <div *ngIf="errorMessage" class="error-banner">
      {{ errorMessage }}
    </div>
    <form (ngSubmit)="onLogin()"> 
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" [(ngModel)]="email" name="email" placeholder="Enter your email" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
       <input type="password" id="password" [(ngModel)]="password" name="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="btn-submit">LOGIN</button>
    </form>
    
    <p class="redirect-text">
      Don't have an account? <a routerLink="/signup">Click here to sign up</a>
    </p>
  </div>
</div>
