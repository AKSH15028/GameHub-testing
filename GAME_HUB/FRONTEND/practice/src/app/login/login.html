<app-header></app-header>
<div class="auth-container">
  <div class="auth-card" [class.shake]="shake">
    <div class="card-header">
      <div class="logo-icon">🎮</div>
      <h2>Welcome Back</h2>
      <p class="subtitle">Sign in to continue your journey</p>
    </div>

    <div *ngIf="errorMessage" class="error-banner">
      <span class="error-icon">⚠️</span> {{ errorMessage }}
    </div>

    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <span class="input-icon">📧</span>
          <input type="email" id="email" [(ngModel)]="email" name="email" placeholder="Enter your email" required autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input [type]="showPassword ? 'text' : 'password'" id="password" [(ngModel)]="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
          <button type="button" class="toggle-pw" (click)="togglePassword()">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit" [disabled]="!isFormValid || isLoading">
        <span *ngIf="!isLoading">LOGIN</span>
        <span *ngIf="isLoading" class="spinner"></span>
      </button>
    </form>

    <p class="redirect-text">
      Don't have an account? <a routerLink="/signup">Create one</a>
    </p>
  </div>
</div>
